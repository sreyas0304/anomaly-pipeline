name: Deploy to Dev

on:
  push:
    branches:
      - develop

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Simulate AWS Dev Deployment
        run: |
          echo "🚀 Starting deployment to the DEV environment..."
          echo "Reading Dev Configuration:"
          cat infrastructure/environments/dev/config.tfvars
          echo "✅ Dev Deployment Complete!"
